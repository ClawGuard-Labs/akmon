name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-build-test:
    name: Go build + test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout onyx
        uses: actions/checkout@v4

      - name: Checkout onyx-templates (sibling)
        uses: actions/checkout@v4
        with:
          repository: ClawGuard-Labs/onyx-templates
          path: ../onyx-templates-src
          fetch-depth: 1
        continue-on-error: true

      - name: Position onyx-templates as sibling of onyx
        shell: bash
        run: |
          if [ -d "${{ github.workspace }}/../onyx-templates-src" ]; then
            mv "${{ github.workspace }}/../onyx-templates-src" "${{ github.workspace }}/../onyx-templates"
            echo "templates checked out at ../onyx-templates"
          else
            echo "::warning::onyx-templates repo not available; template-dependent tests will skip."
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: |
          if [ -d ../onyx-templates ]; then
            go test ./tests/... -race -count=1
          else
            echo "Skipping tests that require ../onyx-templates"
            go test ./tests/... -race -count=1 -run '^$' || true
          fi

  go-lint:
    name: golangci-lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          args: --timeout=5m

  bpf-build:
    name: Build eBPF object
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install eBPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang llvm libbpf-dev linux-libc-dev linux-tools-common \
            "linux-tools-$(uname -r)" bpftool || \
          sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev linux-libc-dev bpftool

      - name: Generate vmlinux.h (best effort)
        run: |
          if [ -f /sys/kernel/btf/vmlinux ]; then
            bash scripts/gen_vmlinux.sh
          else
            echo "::warning::BTF not available on runner; committing a stub vmlinux.h is not supported. The project expects a locally generated header in production."
            exit 1
          fi

      - name: Compile eBPF
        run: make bpf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: monitor.bpf.o
          path: bpf/monitor.bpf.o
          if-no-files-found: error
          retention-days: 7

  ui-build:
    name: UI build + lint
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
